name: Market Close (Notify)

on:
  schedule:
    - cron: "0 7 * * 1-5"   # 오후 4시 KST (7:00 UTC), 평일 장마감 후
  workflow_dispatch: {}      # Actions 탭에서 수동 실행 버튼

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run updater with Discord notify
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_HISTORY_DATABASE_ID: ${{ secrets.NOTION_HISTORY_DATABASE_ID }}
          NOTION_PRICE_DATABASE_ID: ${{ secrets.NOTION_PRICE_DATABASE_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python update_stocks.py --notify
